# ===================================================================
# Candor RealityCheck — Netlify configuration
# ===================================================================

[build]
  publish = "."

# -------------------------------------------------------------------
# Security & privacy headers
# -------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    # Don't let the page be embedded in someone else's site (clickjacking)
    X-Frame-Options = "DENY"
    # Browser MIME-sniffing off
    X-Content-Type-Options = "nosniff"
    # Strict referrer policy — keep paths private
    Referrer-Policy = "strict-origin-when-cross-origin"
    # No camera/mic/location requests from this site
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # HSTS — once on HTTPS, stay on HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# -------------------------------------------------------------------
# Legal pages: keep search engines OUT until counsel signs off
# (also already set via <meta name="robots" content="noindex"> in HTML)
# -------------------------------------------------------------------
[[headers]]
  for = "/terms*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/privacy*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/refund*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/risk-disclaimer*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# -------------------------------------------------------------------
# Caching: HTML short, static assets long
# -------------------------------------------------------------------
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
